<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Supply Chain Circle</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B1E36;
            color: #94A3B8;
            padding: 24px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header h1 { color: #FFFFFF; font-weight: 700; font-size: 1.8rem; }
        .header h1 span { color: #D4A02B; }
        .logout-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94A3B8;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .logout-btn:hover { border-color: #EF4444; color: #EF4444; }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.03);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .login-box h2 { color: #FFFFFF; margin-bottom: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 1rem;
            margin-bottom: 12px;
        }
        .login-box input:focus { outline: none; border-color: #D4A02B; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #D4A02B;
            color: #0B1E36;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .login-box button:hover { transform: scale(1.02); }
        .login-box .error {
            color: #EF4444;
            margin-top: 12px;
            display: none;
            font-size: 0.9rem;
        }
        .hidden { display: none !important; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 20px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .stat-card h3 { color: #D4A02B; font-size: 2rem; font-weight: 800; }
        .stat-card p { color: #94A3B8; margin: 0; font-size: 0.9rem; }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 8px 24px;
            border-radius: 8px;
            color: #94A3B8;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: rgba(212,160,43,0.1);
            border-color: #D4A02B;
            color: #D4A02B;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .table-wrap {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            overflow: auto;
            padding: 16px;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            color: #D4A02B;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-weight: 600;
            font-size: 0.85rem;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #E2E8F0;
            font-size: 0.9rem;
        }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-read { background: rgba(13,148,136,0.15); color: #0D9488; }
        .badge-unread { background: rgba(212,160,43,0.15); color: #D4A02B; }
        .loading { text-align: center; padding: 40px; color: #94A3B8; }
        .empty { text-align: center; padding: 40px; color: #64748B; font-style: italic; }
        .view-btn {
            background: rgba(212,160,43,0.1);
            border: 1px solid rgba(212,160,43,0.2);
            color: #D4A02B;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .view-btn:hover { background: rgba(212,160,43,0.2); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #0B1E36;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { color: #D4A02B; margin-bottom: 16px; }
        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #94A3B8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal .close-btn:hover { color: #EF4444; }
        .modal .field { margin-bottom: 12px; }
        .modal .field strong { color: #D4A02B; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal .field p { color: #E2E8F0; margin: 4px 0 0; word-wrap: break-word; }
        .modal .message-content {
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 8px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- Login Screen -->
        <div id="loginScreen" class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password" />
            <button onclick="login()">Login</button>
            <div id="loginError" class="error">Invalid password</div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardScreen" class="hidden">
            <div class="header">
                <h1>SCC <span>Admin</span></h1>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3 id="totalSubs">0</h3>
                    <p>Subscribers</p>
                </div>
                <div class="stat-card">
                    <h3 id="totalMsgs">0</h3>
                    <p>Messages</p>
                </div>
                <div class="stat-card">
                    <h3 id="unreadMsgs">0</h3>
                    <p>Unread</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('messages')">Messages</button>
                <button class="tab-btn" onclick="showTab('subscribers')">Subscribers</button>
            </div>

            <div id="messagesTab" class="tab-content active">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Name</th><th>Email</th><th>Subject</th><th>Status</th><th>Date</th><th>Action</th></tr>
                        </thead>
                        <tbody id="messagesBody">
                            <tr><td colspan="6" class="loading">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="subscribersTab" class="tab-content">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Email</th><th>Source</th><th>Date</th></tr>
                        </thead>
                        <tbody id="subscribersBody">
                            <tr><td colspan="3" class="loading">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Message Modal -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h2>Message Details</h2>
            <div class="field">
                <strong>From</strong>
                <p id="modalName">-</p>
            </div>
            <div class="field">
                <strong>Email</strong>
                <p id="modalEmail">-</p>
            </div>
            <div class="field">
                <strong>Subject</strong>
                <p id="modalSubject">-</p>
            </div>
            <div class="field">
                <strong>Date</strong>
                <p id="modalDate">-</p>
            </div>
            <div class="field">
                <strong>Message</strong>
                <div class="message-content" id="modalMessage">-</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://scc-web-app.up.railway.app/api/v1';
        let token = localStorage.getItem('admin_token');

        async function login() {
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('loginError');

            if (!password) {
                errorEl.textContent = 'Please enter a password';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    token = data.data.token;
                    localStorage.setItem('admin_token', token);
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardScreen').classList.remove('hidden');
                    fetchData();
                } else {
                    errorEl.textContent = data.message || 'Invalid password';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Network error – please try again';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            if (tab === 'messages') {
                document.getElementById('messagesTab').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                document.getElementById('subscribersTab').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
            }
        }

        function openModal(message) {
            document.getElementById('modalName').textContent = message.name || '-';
            document.getElementById('modalEmail').textContent = message.email || '-';
            document.getElementById('modalSubject').textContent = message.subject || 'No Subject';
            document.getElementById('modalDate').textContent = message.createdAt ? new Date(message.createdAt).toLocaleString() : '-';
            document.getElementById('modalMessage').textContent = message.message || 'No message content';
            document.getElementById('messageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('messageModal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('messageModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        async function fetchData() {
            try {
                // Subscribers
                const subsRes = await fetch(`${API_URL}/subscribers`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (subsRes.status === 401) { logout(); return; }
                const subsData = await subsRes.json();
                document.getElementById('totalSubs').textContent = subsData.total || subsData.data?.length || 0;
                const subsBody = document.getElementById('subscribersBody');
                if (subsData.data && subsData.data.length > 0) {
                    subsBody.innerHTML = subsData.data.map(s => `
                        <tr>
                            <td>${s.email}</td>
                            <td>${s.source || 'Website'}</td>
                            <td>${new Date(s.subscribedAt || s.createdAt).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                } else {
                    subsBody.innerHTML = '<tr><td colspan="3" class="empty">No subscribers yet</td></tr>';
                }

                // Contacts
                const contactsRes = await fetch(`${API_URL}/contacts`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const contactsData = await contactsRes.json();
                const msgs = contactsData.data || [];
                document.getElementById('totalMsgs').textContent = msgs.length;
                document.getElementById('unreadMsgs').textContent = msgs.filter(m => !m.isRead).length;

                const msgsBody = document.getElementById('messagesBody');
                if (msgs.length > 0) {
                    msgsBody.innerHTML = msgs.map(m => `
                        <tr>
                            <td><strong>${m.name}</strong></td>
                            <td>${m.email}</td>
                            <td>${m.subject || 'No Subject'}</td>
                            <td><span class="badge ${m.isRead ? 'badge-read' : 'badge-unread'}">${m.isRead ? 'Read' : 'Unread'}</span></td>
                            <td>${new Date(m.createdAt).toLocaleDateString()}</td>
                            <td><button class="view-btn" onclick='openModal(${JSON.stringify(m)})'>View</button></td>
                        </tr>
                    `).join('');
                } else {
                    msgsBody.innerHTML = '<tr><td colspan="6" class="empty">No messages yet</td></tr>';
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Auto‑login if token exists
        if (token) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').classList.remove('hidden');
            fetchData();
        }
    </script>
</body>
</html>
